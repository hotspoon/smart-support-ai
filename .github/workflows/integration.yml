name: Integration

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: neon-integration-branch
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Integration API (fake AI + Neon test branch)
        run: npm run test:integration
